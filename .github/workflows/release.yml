name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: バージョン取得
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: 重複リリースの防止 (既にリリース済みならスキップ)
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.get_version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.tag }} already exists. Skipping build and release steps."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi


      - name: Node.js のセットアップ
        if: steps.check_release.outputs.exists != 'true'
        uses: actions/setup-node@v6

        with:
          node-version: 24

      - name: pnpm のセットアップ
        if: steps.check_release.outputs.exists != 'true'
        uses: pnpm/action-setup@v6

        with:
          version: latest

      - name: 依存関係のインストール
        if: steps.check_release.outputs.exists != 'true'
        run: pnpm install


      - name: ビルドおよび公証
        if: steps.check_release.outputs.exists != 'true'
        run: pnpm build:mac

        env:
          # コード署名
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # 公証
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: GitHub リリースの作成
        if: steps.check_release.outputs.exists != 'true'
        env:

          GH_TOKEN: ${{ github.token }}
        run: |
          # 現在のコミットに関連するマージ済み PR のタイトルと本文を取得してリリースノートにする
          PR_DATA=$(gh pr list --commit ${{ github.sha }} --state merged --json title,body --jq '.[0] | .title + "\n\n" + .body') || \
          PR_DATA=$(git log -1 --pretty=%B) # フォールバック

          gh release create ${{ steps.get_version.outputs.tag }} \
            --title "${{ steps.get_version.outputs.tag }}" \
            --notes "$PR_DATA" \
            --target main \
            dist/*.dmg \
            dist/*.zip \
            dist/latest-mac.yml
