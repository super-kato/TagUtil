name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: バージョン取得
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: 既存タグのチェック
        run: |
          if git rev-parse "${{ steps.get_version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.get_version.outputs.tag }} already exists. Skipping release."
            exit 0
          fi

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: 依存関係のインストール
        run: pnpm install

      - name: ビルドおよび公証
        run: pnpm build:mac
        env:
          # コード署名
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # 公証
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: GitHub リリースの作成
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 最新のコミットメッセージをリリースノートのデフォルトにする
          TAG_MSG=$(git log -1 --pretty=%B)

          gh release create ${{ steps.get_version.outputs.tag }} \
            --title "${{ steps.get_version.outputs.tag }}" \
            --notes "$TAG_MSG" \
            --target main \
            dist/*.dmg \
            dist/*.zip \
            dist/latest-mac.yml
