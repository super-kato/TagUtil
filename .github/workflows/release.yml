name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check_release.outputs.should_release }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6

      - name: バージョン取得
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: リリースの存在確認
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          echo "Checking release existence for $TAG..."
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists. Skipping build."
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist. Proceeding with build."
          fi

  build-and-release:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: 依存関係のインストール
        run: pnpm install

      - name: ビルドおよび公証
        run: pnpm build:mac
        env:
          # コード署名
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # 公証
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: GitHub リリースの作成
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-release.outputs.tag }}
        run: |
          # 現在のコミットに関連するマージ済み PR のタイトルと本文を取得してリリースノートにする
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0] | select(. != null) | .title + "\n\n" + .body')

          gh release create $TAG \
            --title "$TAG" \
            --notes "$PR_DATA" \
            --target main \
            dist/*.dmg \
            dist/*.zip \
            dist/latest-mac.yml

      - name: 旧バージョンの判定
        id: check_old_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-release.outputs.tag }}
        run: |
          PREV_TAG=$(gh release list -L 2 --json tagName -q '.[1].tagName // empty' || true)

          if [[ -n "$PREV_TAG" ]] && [[ "${TAG%.*}" == "${PREV_TAG%.*}" ]]; then
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
            echo "should_delete=true" >> $GITHUB_OUTPUT
          else
            echo "should_delete=false" >> $GITHUB_OUTPUT
          fi

      - name: 旧バージョンのリリースとタグの削除
        if: steps.check_old_release.outputs.should_delete == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ steps.check_old_release.outputs.prev_tag }}" --yes --cleanup-tag
