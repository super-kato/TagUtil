name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check_release.outputs.exists != 'true' }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6

      - name: バージョン取得
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: リリースの存在確認
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.get_version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.tag }} already exists. Skipping build."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.get_version.outputs.tag }} does not exist. Proceeding with build."
          fi

  build-and-release:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: 依存関係のインストール
        run: pnpm install

      - name: ビルドおよび公証
        run: pnpm build:mac
        env:
          # コード署名
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          # 公証
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: GitHub リリースの作成
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-release.outputs.tag }}
        run: |
          # 現在のコミットに関連するマージ済み PR のタイトルと本文を取得してリリースノートにする
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0] | select(. != null) | .title + "\n\n" + .body')

          gh release create $TAG \
            --title "$TAG" \
            --notes "$PR_DATA" \
            --target main \
            dist/*.dmg \
            dist/*.zip \
            dist/latest-mac.yml

      - name: 旧バージョンのリリースとタグの削除
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-release.outputs.tag }}
        run: |
          # 1. 1つ前のリリースを取得 (最新2件の2番目)
          PREV_TAG=$(gh release list -L 2 --exclude-drafts --exclude-pre-releases --json tagName -q '.[1].tagName // empty' || true)

          if [[ -z "$PREV_TAG" ]]; then
            echo "No previous release found. Skipping deletion."
            exit 0
          fi

          # 2. X.Y の部分を切り出し（.Z を取り除く）
          CURRENT_MINOR="${TAG%.*}"
          PREV_MINOR="${PREV_TAG%.*}"

          # 3. メジャー・マイナーが同じなら、1つ前のリリースとタグを削除
          if [[ "$CURRENT_MINOR" == "$PREV_MINOR" ]]; then
            echo "Previous release $PREV_TAG has the same minor version ($CURRENT_MINOR). Deleting it..."
            gh release delete "$PREV_TAG" --yes --cleanup-tag || true
          else
            echo "Previous release $PREV_TAG is a different minor version ($PREV_MINOR != $CURRENT_MINOR). Skipping deletion."
          fi
