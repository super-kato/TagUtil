name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v6

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: 依存関係のインストール
        run: pnpm install

      - name: テストの実行およびカバレッジ計測
        run: |
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pnpm test --reporter=default --no-color >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
